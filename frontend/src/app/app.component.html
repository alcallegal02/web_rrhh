<div class="flex h-screen bg-gray-50 overflow-hidden">
    <!-- Sidebar (Desktop: Static, Mobile: Drawer) -->
    @if (isAuthenticated() && !isLoginPage()) {
    <app-sidebar [isOpen]="isSidebarOpen()" [isCollapsed]="isSidebarCollapsed()" (closeSidebar)="isSidebarOpen.set(false)"
        class="flex-none"></app-sidebar>
    }

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        <!-- Header (Sticky/Absolute) -->
        <app-header [isCollapsed]="isSidebarCollapsed()" (toggleSidebar)="toggleSidebar()"
            (toggleSidebarCollapse)="toggleSidebarCollapse()"></app-header>

        <!-- Main Scrollable Area -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden scroll-smooth" [class.p-2]="!isLoginPage()"
            [class.md:p-4]="!isLoginPage()">
            <div [class.max-w-none]="!isLoginPage()" [class.mx-auto]="!isLoginPage()" [class.w-full]="!isLoginPage()">
                <router-outlet></router-outlet>
            </div>
        </main>
    </div>
</div>

<app-confirm-dialog></app-confirm-dialog>
