<div class="flex flex-col sm:flex-row justify-center gap-4 mb-8">
    <button (click)="expandAll.emit()"
        class="flex items-center justify-center px-4 py-2 bg-white border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-indigo-600 transition-colors">
        <span class="mr-2 text-lg">+</span> Expandir Todo
    </button>
    <button (click)="collapseAll.emit()"
        class="flex items-center justify-center px-4 py-2 bg-white border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-indigo-600 transition-colors">
        <span class="mr-2 text-lg">−</span> Colapsar Todo
    </button>
</div>
