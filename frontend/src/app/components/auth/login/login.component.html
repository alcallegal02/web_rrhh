<div class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden bg-slate-50">
  <!-- Dynamic Background Background -->
  <div class="absolute inset-0 z-0">
    <img src="assets/login-bg.png" alt="Corporate Background" class="w-full h-full object-cover opacity-60">
    <!-- Subtle Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-tr from-white/80 via-white/40 to-inespasa-dark/10"></div>
  </div>

  <div class="max-w-md w-full relative z-10 animate-fade-in-up">


    <div class="card p-8 md:p-10 shadow-2xl shadow-blue-900/10 border-gray-100/50 backdrop-blur-sm bg-white/95">
      <div class="text-center mb-10">
        <div class="flex justify-center mb-6">
          <img src="assets/logo-inespasa.png" alt="INESPASA Logo" class="h-16 md:h-20 w-auto object-contain">
        </div>
        <div class="flex items-center justify-center gap-2 mb-4">
          <div class="h-1 w-8 bg-inespasa-dark rounded-full"></div>
          <span class="text-[10px] font-bold text-inespasa-dark uppercase tracking-widest">Portal del Empleado</span>
          <div class="h-1 w-8 bg-inespasa-dark rounded-full"></div>
        </div>
        <p class="text-gray-400 text-sm font-medium italic">Transformando el futuro de la industria aeroespacial</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
        @if (infoMessage()) {
        <div class="p-4 bg-inespasa-dark/5 border-l-4 border-inespasa-dark rounded-r-xl animate-shake" role="alert">
          <div class="flex items-center">
            <ng-icon name="lucideInfo" class="text-inespasa-dark mr-3" aria-hidden="true"></ng-icon>
            <p class="text-xs text-inespasa-dark font-bold uppercase tracking-tight">{{ infoMessage() }}</p>
          </div>
        </div>
        }

        <div class="space-y-2">
          <label for="email" class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">
            Identificación
          </label>
          <div class="relative group">
            <ng-icon name="lucideUser"
              class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-inespasa-dark transition-colors"></ng-icon>
            <input type="text" id="email" name="email" [ngModel]="credentials().username"
              (ngModelChange)="updateUsername($event)" required placeholder="Usuario o correo corporativo"
              class="input-field pl-12 bg-gray-50/50 border-gray-100 hover:border-inespasa-light/30 focus:bg-white transition-all shadow-inner"
              autocomplete="username" />
          </div>
        </div>

        <div class="space-y-2">
          <label for="password" class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">
            Clave de Acceso
          </label>
          <div class="relative group">
            <ng-icon name="lucideLockKeyhole"
              class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-inespasa-dark transition-colors"></ng-icon>
            <input type="password" id="password" name="password" [ngModel]="credentials().password"
              (ngModelChange)="updatePassword($event)" required placeholder="••••••••••••"
              class="input-field pl-12 bg-gray-50/50 border-gray-100 hover:border-inespasa-light/30 focus:bg-white transition-all shadow-inner"
              autocomplete="current-password" />
          </div>
        </div>

        @if (error()) {
        <div class="p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl animate-shake" role="alert">
          <div class="flex items-center">
            <ng-icon name="lucideTriangleAlert" class="text-red-500 mr-3 text-lg" aria-hidden="true"></ng-icon>
            <p class="text-xs text-red-700 font-bold uppercase tracking-tight">{{ error() }}</p>
          </div>
        </div>
        }

        <button type="submit" [disabled]="loading() || !loginForm.valid"
          class="btn-primary w-full py-4 rounded-xl shadow-lg shadow-blue-900/20 active:scale-[0.98] transition-all">
          @if (!loading()) {
          <span class="flex items-center justify-center gap-2">
            Acceder al Portal <ng-icon name="lucideArrowRight" class="text-lg"></ng-icon>
          </span>
          } @else {
          <span class="flex items-center justify-center gap-2">
            <ng-icon name="lucideLoaderCircle" class="animate-spin text-xl"></ng-icon>
            Verificando identidad...
          </span>
          }
        </button>
      </form>
    </div>

    <!-- Footer Links -->
    <div class="mt-8 text-center">
      <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.3em]">
        © 2026 INESPASA • Soporte IT
      </p>
    </div>
  </div>
</div>
