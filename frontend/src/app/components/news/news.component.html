<div class="flex flex-col xl:flex-row gap-4 h-full xl:overflow-hidden">

    <!-- Sidebar: News Directory -->
    <div
        class="w-full xl:w-[30%] min-w-[380px] xl:max-w-[500px] flex flex-col bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden shrink-0 order-2 xl:order-1">
        
        <!-- Generic Data Filter -->
        <div class="p-2 sm:p-4 bg-gray-50/50 border-b border-gray-100 flex-none">
            <app-data-filter [fields]="filterSchema" (filterChange)="onFiltersChanged($event)">
            </app-data-filter>

            <!-- New News Button (Keep it outside filter for logic separation) -->
            @if (isAdmin()) {
            <div class="mt-4">
                <button (click)="resetForm()"
                    class="w-full p-3 rounded-xl bg-blue-50 text-[#3C65AB] border border-blue-100 hover:bg-[#3C65AB] hover:text-white hover:shadow-lg hover:shadow-blue-500/20 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 text-xs font-black uppercase tracking-widest group">
                    <ng-icon name="lucidePlus" class="text-lg group-hover:scale-110 transition-transform"></ng-icon>
                    <span>Nueva Noticia</span>
                </button>
            </div>
            }
        </div>

        <!-- Sidebar List -->
        @let list = newsList();
        <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1 min-h-[300px] xl:min-h-0">
            <app-news-list [newsList]="list" [editingId]="editingNewsId()"
                [canManage]="isAdmin()"
                layout="sidebar" (edit)="onEdit($event)" (delete)="onDelete($event)"
                (statusChange)="onStatusChange($event)">
            </app-news-list>
        </div>

        <!-- Sidebar Footer -->
        <div
            class="p-3 bg-gray-50 border-t border-gray-100 flex items-center justify-between text-[10px] text-gray-400 font-bold uppercase tracking-widest">
            <span>Total</span>
            <span class="bg-white px-2 py-0.5 rounded-md border border-gray-200 text-gray-600">{{ list.length
                }}</span>
        </div>
    </div>

    <!-- Main Content Area -->
    <div
        class="flex-1 xl:overflow-y-auto order-1 xl:order-2">
        @if (isAdmin()) {
            <app-news-form [initialData]="initialFormData()" (save)="onSave($event)" (cancel)="onCancel()">
            </app-news-form>
        }
    </div>

</div>
