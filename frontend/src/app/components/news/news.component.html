<div class="flex flex-col xl:flex-row gap-4 h-full xl:overflow-hidden">

    <!-- Sidebar: News Directory -->
    <div
        class="w-full xl:w-[30%] min-w-[380px] max-w-[500px] flex flex-col bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden shrink-0 order-2 xl:order-1">
        <!-- Sidebar Header -->
        <div class="p-4 bg-gray-50/50 border-b border-gray-100">
            <div class="flex items-center gap-3 mb-4">
                <div
                    class="h-8 w-8 rounded-lg bg-[#3C65AB] text-white flex items-center justify-center shadow-md shadow-blue-500/10">
                    <ng-icon name="lucideNewspaper" class="text-lg"></ng-icon>
                </div>
                <h2 class="text-sm font-black text-gray-900 uppercase tracking-widest">Tablero de Noticias</h2>
            </div>

            <!-- Dynamic Filters -->
            <div class="space-y-4 pt-2 border-t border-gray-100">
                <div class="grid grid-cols-1 gap-4">
                    @if (isAdmin()) {
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider ml-1">Estados</label>
                        <div class="flex flex-wrap gap-1.5 p-1">
                            @for (status of statusOptions; track status.value) {
                            <button (click)="toggleFilterStatus(status.value)"
                                class="inline-flex items-center px-3 py-2 rounded-xl border text-[11px] font-bold transition-all shadow-sm active:scale-95 flex-1 justify-center whitespace-nowrap"
                                [class.bg-inespasa]="isFilterStatusSelected(status.value)"
                                [class.text-white]="isFilterStatusSelected(status.value)"
                                [class.border-inespasa]="isFilterStatusSelected(status.value)"
                                [class.shadow-inespasa-light/20]="isFilterStatusSelected(status.value)"
                                [class.bg-white]="!isFilterStatusSelected(status.value)"
                                [class.text-gray-500]="!isFilterStatusSelected(status.value)"
                                [class.border-gray-100]="!isFilterStatusSelected(status.value)"
                                [class.hover:border-inespasa-light/30]="!isFilterStatusSelected(status.value)"
                                [class.hover:bg-inespasa-light/5]="!isFilterStatusSelected(status.value)">
                                <ng-icon [name]="status.icon" size="16" strokeWidth="2.5" class="mr-2"
                                    [class.text-white]="isFilterStatusSelected(status.value)"
                                    [class.text-gray-400]="!isFilterStatusSelected(status.value) && status.value === 'borrador'"
                                    [class.text-emerald-500]="!isFilterStatusSelected(status.value) && status.value === 'publicada'"
                                    [class.text-amber-500]="!isFilterStatusSelected(status.value) && status.value === 'archivada'">
                                </ng-icon>
                                {{ status.label }}
                            </button>
                            }
                        </div>
                    </div>
                    }

                    <!-- Date Filters -->
                    <div class="flex items-center gap-2">
                        <div class="relative flex-1">
                            <input type="date" [value]="filterStartDate()"
                                (change)="setFilterStartDate($any($event.target).value)"
                                class="w-full px-3 py-2 bg-white border border-gray-100 rounded-xl text-[10px] font-bold text-gray-600 focus:outline-none focus:border-blue-500/50 hover:border-[#3C65AB]/30 transition-all cursor-pointer">
                            <span
                                class="absolute -top-1.5 left-2 px-1 bg-white text-[8px] font-black text-gray-400 uppercase tracking-tighter">Desde</span>
                        </div>
                        <div class="relative flex-1">
                            <input type="date" [value]="filterEndDate()"
                                (change)="setFilterEndDate($any($event.target).value)"
                                class="w-full px-3 py-2 bg-white border border-gray-100 rounded-xl text-[10px] font-bold text-gray-600 focus:outline-none focus:border-blue-500/50 hover:border-[#3C65AB]/30 transition-all cursor-pointer">
                            <span
                                class="absolute -top-1.5 left-2 px-1 bg-white text-[8px] font-black text-gray-400 uppercase tracking-tighter">Hasta</span>
                        </div>
                    </div>
                </div>

                @if (filterStatus().length > 0 || filterStartDate() || filterEndDate()) {
                <button (click)="clearFilters()"
                    class="w-full py-1.5 text-[9px] font-black uppercase tracking-widest text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all flex items-center justify-center gap-1.5">
                    <ng-icon name="lucideX" class="text-xs"></ng-icon>
                    Limpiar filtros
                </button>
                }
            </div>

            <!-- New News Button -->
            <div class="mt-6 pt-6 border-t border-gray-100">
                <button (click)="resetForm()"
                    class="w-full p-3 mb-2 rounded-xl bg-blue-50 text-[#3C65AB] border border-blue-100 hover:bg-[#3C65AB] hover:text-white hover:shadow-lg hover:shadow-blue-500/20 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 text-xs font-black uppercase tracking-widest group">
                    <ng-icon name="lucidePlus" class="text-lg group-hover:scale-110 transition-transform"></ng-icon>
                    <span>Nueva Noticia</span>
                </button>
            </div>
        </div>

        <!-- Sidebar List -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1 min-h-[300px] xl:min-h-0">
            <app-news-list [newsList]="newsList()" [editingId]="editingNewsId()"
                [canManage]="authService.isRRHH() || authService.isAdmin() || authService.isSuperadmin()"
                layout="sidebar" (edit)="onEdit($event)" (delete)="onDelete($event)"
                (statusChange)="onStatusChange($event)">
            </app-news-list>
        </div>

        <!-- Sidebar Footer -->
        <div
            class="p-3 bg-gray-50 border-t border-gray-100 flex items-center justify-between text-[10px] text-gray-400 font-bold uppercase tracking-widest">
            <span>Total</span>
            <span class="bg-white px-2 py-0.5 rounded-md border border-gray-200 text-gray-600">{{ newsList().length
                }}</span>
        </div>
    </div>

    <!-- Main Content Area -->
    <div
        class="flex-1 xl:overflow-y-auto order-1 xl:order-2">
        @if (isAdmin()) {
            <app-news-form [initialData]="initialFormData()" (save)="onSave($event)" (cancel)="onCancel()">
            </app-news-form>
        }
    </div>

</div>
