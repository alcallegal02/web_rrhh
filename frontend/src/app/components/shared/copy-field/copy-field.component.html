<div class="copy-field-container group">
    <div class="flex flex-col">
        <label class="copy-field-label">{{ label() }}</label>
        <div class="copy-field-input-wrapper">
            <div class="relative flex items-center w-full">
                <input [type]="isSensitive() && !isVisible() ? 'password' : 'text'" [value]="value()" readonly
                    class="copy-field-input" [class.sensitive]="isSensitive() && !isVisible()" />

                <div class="flex items-center gap-1 px-2">
                    @if (isSensitive()) {
                    <button (click)="toggleVisibility()" class="action-btn"
                        [title]="isVisible() ? 'Ocultar' : 'Mostrar'">
                        @if (isVisible()) {
                        <ng-icon name="lucideEye" class="w-5 h-5 flex items-center justify-center"></ng-icon>
                        } @else {
                        <ng-icon name="lucideEyeOff" class="w-5 h-5 flex items-center justify-center"></ng-icon>
                        }
                    </button>
                    }

                    <button (click)="copyToClipboard()" class="action-btn copy-btn" [class.copied]="copied()"
                        [title]="copied() ? '¡Copiado!' : 'Copiar'">
                        @if (copied()) {
                        <ng-icon name="lucideCheck"
                            class="w-5 h-5 text-green-500 animate-in zoom-in duration-300 flex items-center justify-center"></ng-icon>
                        } @else {
                        <ng-icon name="lucideCopy" class="w-5 h-5 flex items-center justify-center"></ng-icon>
                        }
                    </button>
                </div>
            </div>
        </div>
    </div>

    @if (showToast()) {
    <div class="copy-toast">
        ¡Copiado!
    </div>
    }
</div>
