<div class="copy-field-container group">
    <div class="flex flex-col">
        <label class="copy-field-label">{{ label() }}</label>
        <div class="copy-field-input-wrapper">
            <div class="relative flex items-center w-full">
                <input [type]="isSensitive() && !isVisible() ? 'password' : 'text'" [value]="value()" readonly
                    class="copy-field-input" [class.sensitive]="isSensitive() && !isVisible()" />

                <div class="flex items-center gap-1 px-2">
                    @if (isSensitive()) {
                    <button (click)="toggleVisibility()" class="action-btn"
                        [title]="isVisible() ? 'Ocultar' : 'Mostrar'">
                        @if (isVisible()) {
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                            stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                        } @else {
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                            stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.399 8.049 7.21 4.5 12 4.5s8.601 3.549 9.964 7.178c.07.232.07.468 0 .702-1.364 4.273-5.174 7.822-9.964 7.822-4.79 0-8.601-3.549-9.964-7.822Z" />
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>
                        }
                    </button>
                    }

                    <button (click)="copyToClipboard()" class="action-btn copy-btn" [class.copied]="copied()"
                        [title]="copied() ? '¡Copiado!' : 'Copiar'">
                        @if (copied()) {
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                            stroke="currentColor" class="w-5 h-5 text-green-500 animate-in zoom-in duration-300">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
                        </svg>
                        } @else {
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                            stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.732-2.11 1.73a2.25 2.25 0 0 0-2.248 2.235v13.5A2.25 2.25 0 0 0 8.392 21.91h7.216a2.25 2.25 0 0 0 2.248-2.235V6.123a2.25 2.25 0 0 0-2.248-2.235h-3.414c-.015 0-.03.015-.045.015.015 0 .03-.015.045-.015Z" />
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M8.392 21.91h7.216a2.25 2.25 0 0 0 2.248-2.235V6.123c0-.12-.01-.24-.03-.358" />
                        </svg>
                        }
                    </button>
                </div>
            </div>
        </div>
    </div>

    @if (showToast()) {
    <div class="copy-toast">
        ¡Copiado!
    </div>
    }
</div>
