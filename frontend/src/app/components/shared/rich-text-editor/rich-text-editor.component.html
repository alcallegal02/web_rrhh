<div [class]="'quill-editor-container ' + variantClass()" [style.min-height]="height()">
    <quill-editor 
        [modules]="quillModules()" 
        [styles]="{ height: '100%', width: '100%' }" 
        [placeholder]="placeholder()"
        [(ngModel)]="content"
        (onContentChanged)="onContentChange($event.html ?? '')"
        (onEditorCreated)="onEditorCreated($event)">
    </quill-editor>
</div>
