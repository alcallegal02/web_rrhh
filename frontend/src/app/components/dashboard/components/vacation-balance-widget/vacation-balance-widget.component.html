<div class="card p-6 group cursor-pointer hover:shadow-lg transition-all duration-300 border-l-4 border-l-inespasa-dark bg-white"
    routerLink="/vacation">
    <div class="flex items-center justify-between mb-4">
        <div
            class="w-10 h-10 bg-inespasa-dark/5 rounded-lg flex items-center justify-center text-xl group-hover:bg-inespasa-dark group-hover:text-white transition-colors">
            <ng-icon name="lucidePalmtree"></ng-icon>
        </div>
        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Mi Balance</span>
    </div>

    <div class="mb-2">
        <h3 class="text-sm font-bold text-gray-500 truncate mb-1">{{ balance()?.name || 'Vacaciones' }}</h3>
        <div class="flex items-baseline gap-1">
            <span class="text-3xl font-black text-inespasa-dark">{{ balance()?.available_value || 0 }}</span>
            <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter">{{ getUnitLabel(balance()?.unit)
                }}</span>
        </div>
    </div>

    <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-50">
        <span class="text-[10px] font-bold text-inespasa-dark uppercase tracking-wider">Gestionar ausencias</span>
        <ng-icon name="lucideArrowRight"
            class="text-xl text-inespasa-dark transform group-hover:translate-x-1 transition-transform"></ng-icon>
    </div>
</div>
