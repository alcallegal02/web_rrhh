<header [class]="isLoginPage() 
    ? 'absolute top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 h-16 shadow-sm' 
    : 'bg-inespasa-dark sticky top-0 z-30 h-16 shadow-lg shadow-blue-900/20 text-white'">
    <div class="px-6 h-full flex items-center justify-between">
        <div class="flex items-center gap-4">
            <!-- Hamburger Button (Mobile/Tablet only) -->
            @if (authService.isAuthenticated()) {
            <div class="flex items-center gap-1">
                <!-- Hamburger Button (Mobile/Tablet only) -->
                <button (click)="toggleSidebar.emit()"
                    class="lg:hidden p-2 rounded-lg text-white/80 hover:bg-white/10 hover:text-white transition-all focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h7" />
                    </svg>
                </button>

                <!-- Collapse Toggle Button (Desktop only) -->
                <button (click)="toggleSidebarCollapse.emit()"
                    class="hidden lg:flex p-2 rounded-lg text-white/80 hover:bg-white/10 hover:text-white transition-all focus:outline-none"
                    [title]="isCollapsed() ? 'Expandir lateral' : 'Contraer lateral'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform transition-transform duration-300"
                        [class.rotate-180]="isCollapsed()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                    </svg>
                </button>
            </div>
            }

            <!-- Mobile Logo -->
            <a [routerLink]="authService.isAuthenticated() ? '/dashboard' : '/login'"
                class="lg:hidden flex items-center">
                @if (isLoginPage()) {
                <img src="assets/logo-inespasa.png" alt="INESPASA Logo" class="h-8 w-auto object-contain">
                } @else {
                <img src="assets/logo-inespasa-icon.png" alt="INESPASA Icon" class="h-8 w-8 object-contain">
                }
            </a>

            <!-- Page Title (Desktop) -->
            @if (pageTitle()) {
            <div class="hidden lg:flex items-center gap-2">
                <div class="h-4 w-1 bg-inespasa-light rounded-full"></div>
                <h1
                    [class]="isLoginPage() ? 'text-sm font-bold text-gray-600 uppercase tracking-widest' : 'text-sm font-bold text-white uppercase tracking-widest'">
                    {{ pageTitle() }}
                </h1>
            </div>
            }
        </div>

        <!-- Right Side: User Profile -->
        <div class="flex items-center gap-3">

            <!-- Canal de Denuncias (Refined) -->
            <a routerLink="/complaint"
                [class]="isLoginPage()
                    ? 'hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg text-gray-600 hover:text-inespasa-dark hover:bg-inespasa-dark/5 transition-all group border border-transparent hover:border-inespasa-dark/10'
                    : 'hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg text-white/90 hover:text-white hover:bg-white/10 transition-all group border border-transparent hover:border-white/10'"
                title="Canal de Denuncias">
                <span class="text-lg transform group-hover:rotate-12 transition-transform">📢</span>
                <span class="text-xs font-black uppercase tracking-widest">Canal Etico</span>
            </a>

            <div
                [class]="isLoginPage() ? 'hidden sm:block h-6 w-px bg-gray-100 mx-1' : 'hidden sm:block h-6 w-px bg-white/10 mx-1'">
            </div>

            <!-- User Information -->
            @if (authService.isAuthenticated()) {
            <div class="flex items-center gap-2">
                <!-- User Menu Trigger -->
                <button (click)="isModalOpen = true"
                    class="flex items-center gap-3 pl-3 pr-2 py-1.5 rounded-full hover:bg-white/5 transition-all border border-transparent hover:border-white/10 group">

                    <div class="flex flex-col items-end hidden md:flex text-right">
                        <span class="text-xs font-bold text-white group-hover:text-white transition-colors">
                            {{ authService.user()?.full_name }}
                        </span>
                        <span class="text-[10px] text-white/60 font-medium uppercase tracking-tighter">{{
                            authService.user()?.role?.replace('_', ' ') }}</span>
                    </div>

                    <div
                        class="w-9 h-9 bg-white/10 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-inner ring-2 ring-inespasa-dark/50 overflow-hidden border border-white/20">
                        @if (authService.user()?.photo_url) {
                        <img [src]="authService.user()?.photo_url" class="w-full h-full object-cover">
                        } @else {
                        <span>{{ authService.user()?.full_name?.charAt(0) }}</span>
                        }
                    </div>
                </button>

                <!-- Logout -->
                <button (click)="logout()"
                    class="p-2 text-white/60 hover:text-white hover:bg-white/10 rounded-lg transition-all group"
                    title="Cerrar Sesión">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="h-5 w-5 group-hover:translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
            }
        </div>
    </div>
</header>

<app-user-profile-modal [isOpen]="isModalOpen" [user]="authService.user()" (closeEvent)="isModalOpen = false">
</app-user-profile-modal>
