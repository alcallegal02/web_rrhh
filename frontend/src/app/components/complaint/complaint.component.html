<div class="max-w-screen-2xl mx-auto pb-12 px-4 md:px-8 animate-fadeIn">
    <!-- Portal Header -->
    <div
        class="bg-white rounded-[2.5rem] p-10 md:p-16 shadow-xl shadow-gray-200/50 border border-gray-100 mb-12 text-center relative overflow-hidden">
        <!-- Background Accent -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-1 bg-inespasa rounded-b-full opacity-20"></div>

        <div class="relative z-10">
            <div
                class="inline-flex items-center justify-center w-24 h-24 bg-inespasa text-white rounded-3xl mb-8 shadow-xl shadow-inespasa-light/30 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
                <ng-icon name="lucideMegaphone" class="text-5xl"></ng-icon>
            </div>

            <h1 class="text-4xl md:text-5xl font-black text-gray-900 mb-6 tracking-tight">Canal de Denuncias</h1>

            <div class="max-w-4xl mx-auto space-y-6">
                <p class="text-gray-500 text-lg leading-relaxed">
                    Un espacio seguro y <span
                        class="text-inespasa font-black uppercase tracking-widest text-sm bg-inespasa-light/10 px-3 py-1 rounded-lg">completamente
                        anónimo</span> para comunicar cualquier irregularidad o conducta inapropiada.
                </p>

                <div class="flex flex-col md:flex-row items-center justify-center gap-4 pt-4">
                    <div
                        class="flex items-center gap-3 px-6 py-4 bg-amber-50 rounded-2xl border border-amber-100 text-amber-800 text-left md:max-w-xs">
                        <ng-icon name="lucideTriangleAlert" class="text-2xl flex-none"></ng-icon>
                        <p class="text-[10px] font-bold uppercase tracking-wider leading-relaxed">
                            <span class="block text-amber-600 mb-0.5">Importante</span>
                            Guarda los códigos que recibirás para consultar el estado de tu denuncia.
                        </p>
                    </div>
                    <div
                        class="flex items-center gap-3 px-6 py-4 bg-gray-50 rounded-2xl border border-gray-100 text-gray-600 text-left md:max-w-xs">
                        <ng-icon name="lucideShieldCheck" class="text-2xl flex-none text-inespasa"></ng-icon>
                        <p class="text-[10px] font-bold uppercase tracking-wider leading-relaxed">
                            <span class="block text-gray-400 mb-0.5">Privacidad</span>
                            No se requiere registro ni identificación personal de ningún tipo.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Forms Section -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        <app-complaint-lookup (lookup)="onLookup($event)" class="lg:col-span-5 order-2 lg:order-1">
        </app-complaint-lookup>

        <app-complaint-form (onSuccessNavigation)="onSuccessNavigation($event)"
            class="lg:col-span-7 order-1 lg:order-2">
        </app-complaint-form>
    </div>
</div>
