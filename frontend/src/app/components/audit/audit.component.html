<div class="p-4 md:p-8 bg-gray-50 min-h-screen">
    <div class="max-w-none mx-auto">
        
        <app-page-header 
            title="Auditoría del Sistema" 
            subtitle="Monitorización en tiempo real de la plataforma"
            icon="lucideShieldCheck"
            [actions]="pageActions"
            (actionClick)="logsResource.reload()">
            
            <div extra-actions class="px-4 py-2 bg-white border border-gray-100 rounded-xl flex flex-col items-center shadow-sm">
                <span class="text-[8px] font-black text-gray-400 uppercase tracking-widest leading-none mb-1">Registros</span>
                <span class="text-sm font-black text-inespasa leading-none">{{ logs().length }}</span>
            </div>
        </app-page-header>

        <app-audit-filters (filtersChanged)="onFiltersChanged($event)">
        </app-audit-filters>

        @if (loading()) {
            <div class="h-96 bg-white rounded-3xl border border-dashed border-gray-200 animate-pulse flex items-center justify-center">
                <div class="text-center">
                    <div class="w-12 h-12 border-4 border-inespasa border-t-transparent rounded-full animate-spin mb-4 mx-auto"></div>
                    <p class="text-gray-400 font-bold uppercase tracking-widest text-[10px]">Sincronizando logs...</p>
                </div>
            </div>
        } @else {
            <app-data-table 
                [columns]="tableColumns" 
                [data]="logs()"
                [hasActions]="true">
                
                <ng-template #rowActions let-row>
                    <button (click)="onItemSelected(row)"
                        class="p-2 text-gray-400 hover:text-inespasa hover:bg-blue-50 rounded-lg transition-all">
                        <ng-icon name="lucideSearch" class="text-lg"></ng-icon>
                    </button>
                </ng-template>
            </app-data-table>
        }
    </div>
</div>

@if (selectedLog()) {
<app-audit-details [log]="selectedLog()!" (close)="selectedLog.set(null)">
</app-audit-details>
}
