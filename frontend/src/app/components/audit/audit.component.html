<div class="p-2 md:p-4 bg-gray-50 min-h-screen">
    <div class="max-w-none mx-auto">
        <!-- Header -->
        <div class="mb-8 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
            <div class="space-y-1">
                <div class="flex items-center gap-3">
                    <div
                        class="flex items-center justify-center w-12 h-12 rounded-2xl bg-inespasa shadow-lg shadow-inespasa-light/30 text-white">
                        <ng-icon name="lucideShieldCheck" class="text-2xl"></ng-icon>
                    </div>
                    <div>
                        <h2 class="text-3xl font-black text-gray-900 tracking-tight leading-none">Auditoría del Sistema
                        </h2>
                        <p class="text-gray-500 mt-1.5 text-sm font-bold flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            Monitorización en tiempo real de la plataforma
                        </p>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 p-1.5 bg-white border border-gray-100 rounded-2xl shadow-sm">
                <div class="px-4 py-2 bg-gray-50 rounded-xl border border-gray-100 flex flex-col items-center">
                    <span
                        class="text-[10px] font-black text-gray-400 uppercase tracking-widest leading-none mb-1">Registros</span>
                    <span class="text-lg font-black text-inespasa leading-none">{{ logs().length }}</span>
                </div>
            </div>
        </div>

        <app-audit-filters (filtersChanged)="onFiltersChanged($event)">
        </app-audit-filters>

        <app-audit-list [logs]="logs()" [loading]="loading()" [currentPage]="currentPage()" [pageSize]="pageSize"
            (itemSelected)="onItemSelected($event)" (pageChange)="onPageChange($event)">
        </app-audit-list>
    </div>
</div>

@if (selectedLog()) {
<app-audit-details [log]="selectedLog()!" (close)="selectedLog.set(null)">
</app-audit-details>
}
