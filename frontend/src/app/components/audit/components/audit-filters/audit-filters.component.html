<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5 mb-6 grid grid-cols-1 md:grid-cols-4 gap-4">
    <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Módulo</label>
        <select [ngModel]="filterModule()" (ngModelChange)="filterModule.set($event); applyFilters()"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 text-gray-700">
            <option value="">Todos</option>
            <option value="NEWS">Noticias</option>
            <option value="COMPLAINTS">Denuncias</option>
            <option value="CONVENIO">Convenio</option>
            <option value="UPLOAD_COMMON">Archivos (Común)</option>
            <option value="UPLOAD_COMPLAINTS">Archivos (Denuncias)</option>
        </select>
    </div>
    <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Acción</label>
        <input type="text" [ngModel]="filterAction()" (ngModelChange)="filterAction.set($event)"
            (keyup.enter)="applyFilters()" placeholder="Ej: CREATE, UPDATE..."
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-gray-50 text-gray-700">
    </div>
    <div class="md:col-span-2 flex items-end">
        <button (click)="clearFilters()"
            class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg hover:bg-gray-200 transition-colors font-medium">
            Limpiar Filtros
        </button>
    </div>
</div>
