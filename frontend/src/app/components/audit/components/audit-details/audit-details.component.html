<div class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">

        <div class="fixed inset-0 bg-black bg-opacity-30 transition-opacity" aria-hidden="true" (click)="close.emit()">
        </div>

        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <div
            class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="sm:flex sm:items-start">
                    <div
                        class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-indigo-100 sm:mx-0 sm:h-10 sm:w-10">
                        <svg class="h-6 w-6 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
                            Detalles de Auditoría
                        </h3>
                        <div class="mt-4 space-y-3">
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="block text-gray-500 text-xs uppercase">Acción</span>
                                    <span class="font-medium text-gray-900">{{ log().action }}</span>
                                </div>
                                <div>
                                    <span class="block text-gray-500 text-xs uppercase">Módulo</span>
                                    <span class="font-medium text-gray-900">{{ log().module }}</span>
                                </div>
                                <div>
                                    <span class="block text-gray-500 text-xs uppercase">Fecha</span>
                                    <span class="font-medium text-gray-900">{{ formatDate(log().created_at) }}</span>
                                </div>
                                <div>
                                    <span class="block text-gray-500 text-xs uppercase">Usuario</span>
                                    @if (log().user) {
                                    <span class="font-medium text-gray-900">
                                        {{ log().user!.first_name }} {{ log().user!.last_name }}
                                    </span>
                                    } @else {
                                    <span class="font-medium text-gray-900 italic">
                                        Anónimo / Sistema
                                    </span>
                                    }
                                </div>
                            </div>

                            <div class="bg-gray-50 rounded p-3 mt-4">
                                <span class="block text-gray-500 text-xs uppercase mb-2">Datos Técnicos (JSON)</span>
                                <pre
                                    class="text-xs text-gray-700 whitespace-pre-wrap font-mono overflow-auto max-h-60">{{ log().details | json }}</pre>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button (click)="close.emit()" type="button"
                    class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                    Cerrar
                </button>
            </div>
        </div>
    </div>
</div>
