<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4 lg:gap-6">
    @for (month of calendarMonths(); track month.month) {
    <div
        class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl hover:shadow-blue-500/5 transition-all duration-500 group">
        <!-- Month Header -->
        <div class="bg-gray-50/50 px-4 py-3.5 border-b border-gray-100 flex items-center justify-center">
            <h3 class="text-[11px] font-black text-gray-900 uppercase tracking-[0.2em]">
                {{ month.name }}
            </h3>
        </div>

        <!-- Days Grid -->
        <div class="p-4">
            <!-- Weekday Labels -->
            <div class="grid grid-cols-7 mb-3 text-center">
                <span class="text-[9px] font-black text-gray-300 uppercase">Lu</span>
                <span class="text-[9px] font-black text-gray-300 uppercase">Ma</span>
                <span class="text-[9px] font-black text-gray-300 uppercase">Mi</span>
                <span class="text-[9px] font-black text-gray-300 uppercase">Ju</span>
                <span class="text-[9px] font-black text-gray-300 uppercase">Vi</span>
                <span class="text-[9px] font-black text-red-200 uppercase">Sa</span>
                <span class="text-[9px] font-black text-red-200 uppercase">Do</span>
            </div>

            <!-- Days -->
            <div class="grid grid-cols-7 gap-1 text-center">
                @for (day of month.days; track $index) {
                <div (click)="dayClick.emit(day)"
                    [className]="'aspect-square flex items-center justify-center rounded-xl text-[11px] transition-all ' + getDayClass(day)">
                    {{ day.day || '' }}
                </div>
                }
            </div>
        </div>
    </div>
    }
</div>
