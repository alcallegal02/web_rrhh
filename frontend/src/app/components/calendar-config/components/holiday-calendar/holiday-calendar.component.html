<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    @for (month of calendarMonths(); track month.month) {
    <div
        class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow">
        <!-- Header -->
        <div class="bg-gradient-to-r from-slate-50 to-white px-4 py-3 border-b border-slate-100">
            <h3 class="text-sm font-bold text-gray-800 uppercase tracking-wide text-center">
                {{ month.name }}
            </h3>
        </div>

        <!-- Days Grid -->
        <div class="p-4">
            <!-- Weekday Labels -->
            <div class="grid grid-cols-7 mb-2 text-center">
                <span class="text-[10px] font-bold text-gray-400">L</span>
                <span class="text-[10px] font-bold text-gray-400">M</span>
                <span class="text-[10px] font-bold text-gray-400">X</span>
                <span class="text-[10px] font-bold text-gray-400">J</span>
                <span class="text-[10px] font-bold text-gray-400">V</span>
                <span class="text-[10px] font-bold text-gray-400 text-red-300">S</span>
                <span class="text-[10px] font-bold text-gray-400 text-red-300">D</span>
            </div>

            <!-- Days -->
            <div class="grid grid-cols-7 gap-1 text-center text-xs">
                @for (day of month.days; track $index) {
                <div (click)="dayClick.emit(day)"
                    [className]="'aspect-square flex items-center justify-center rounded-lg ' + getDayClass(day)">
                    {{ day.day || '' }}
                </div>
                }
            </div>
        </div>
    </div>
    }
</div>
