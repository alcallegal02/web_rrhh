<div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipo</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Descripción
                </th>
                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones
                </th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            @for (holiday of holidays(); track holiday.id) {
            <tr class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium">
                    {{ holiday.date | date:'dd/MM/yyyy' }}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                    {{ holiday.name }}
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span [class]="getBadgeClass(holiday.holiday_type)">
                        {{ getTypeLabel(holiday.holiday_type) }}
                    </span>
                </td>
                <td class="px-6 py-4 text-sm text-gray-500 truncate max-w-xs">
                    {{ holiday.description || '-' }}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                    <button (click)="edit.emit(holiday)"
                        class="text-indigo-600 hover:text-indigo-900 mr-4">Editar</button>
                    <button (click)="delete.emit(holiday)" class="text-red-600 hover:text-red-900">Eliminar</button>
                </td>
            </tr>
            }
            @if(holidays().length === 0) {
            <tr>
                <td colspan="5" class="px-6 py-10 text-center text-gray-500 italic">
                    No hay festivos configurados para este año.
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
