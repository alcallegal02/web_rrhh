<div class="space-y-2 p-1">
    @for (holiday of holidays(); track holiday.id) {
    <div
        class="group relative bg-white rounded-2xl border-2 border-transparent hover:border-blue-100 hover:bg-gray-50/50 transition-all duration-300 p-3 shadow-sm hover:shadow-md">

        <div class="flex items-start gap-3">
            <!-- Type Icon/Avatar -->
            <div class="h-10 w-10 shrink-0 rounded-xl flex items-center justify-center text-lg shadow-sm border border-gray-100"
                [class.bg-red-50]="holiday.holiday_type === HolidayType.NATIONAL"
                [class.text-red-500]="holiday.holiday_type === HolidayType.NATIONAL"
                [class.bg-blue-50]="holiday.holiday_type === HolidayType.REGIONAL"
                [class.text-blue-500]="holiday.holiday_type === HolidayType.REGIONAL"
                [class.bg-green-50]="holiday.holiday_type === HolidayType.LOCAL"
                [class.text-green-500]="holiday.holiday_type === HolidayType.LOCAL"
                [class.bg-gray-50]="holiday.holiday_type === HolidayType.OTHER"
                [class.text-gray-400]="holiday.holiday_type === HolidayType.OTHER">
                <ng-icon name="lucideCalendarDays"></ng-icon>
            </div>

            <!-- Content -->
            <div class="flex-1 min-w-0 pr-20">
                <div class="flex items-center justify-between gap-2 mb-0.5">
                    <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">
                        {{ holiday.date | date:'dd MMM yyyy' }}
                    </span>
                    <span class="text-[8px] font-black px-1.5 py-0.5 rounded-md uppercase tracking-wider"
                        [class]="getBadgeClass(holiday.holiday_type)">
                        {{ getTypeLabel(holiday.holiday_type) }}
                    </span>
                </div>
                <h4 class="text-xs font-black text-gray-900 group-hover:text-[#3C65AB] transition-colors truncate">
                    {{ holiday.name }}
                </h4>
                @if (holiday.description) {
                <p class="text-[10px] text-gray-400 font-medium truncate italic mt-0.5">{{ holiday.description }}</p>
                }
            </div>
        </div>

        <!-- Hover Actions -->
        <div
            class="absolute inset-y-0 right-2 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button (click)="edit.emit(holiday)"
                class="h-7 w-7 rounded-lg bg-white border border-gray-100 text-gray-400 hover:text-[#3C65AB] hover:border-blue-200 shadow-sm flex items-center justify-center transition-all active:scale-90">
                <ng-icon name="lucidePencil" class="text-xs"></ng-icon>
            </button>
            <button (click)="delete.emit(holiday)"
                class="h-7 w-7 rounded-lg bg-red-50 border border-red-100 text-red-400 hover:bg-red-500 hover:text-white shadow-sm flex items-center justify-center transition-all active:scale-90">
                <ng-icon name="lucideTrash2" class="text-xs"></ng-icon>
            </button>
        </div>
    </div>
    } @empty {
    <div class="p-8 text-center text-gray-400 bg-gray-50/50 rounded-2xl border-2 border-dashed border-gray-100">
        <div
            class="h-10 w-10 mx-auto bg-white rounded-xl shadow-sm border border-gray-50 flex items-center justify-center mb-3">
            <ng-icon name="lucideInfo" class="text-xl opacity-30"></ng-icon>
        </div>
        <p class="text-[10px] font-black uppercase tracking-[0.2em] leading-relaxed">Sin festivos<br>configurados</p>
    </div>
    }
</div>
