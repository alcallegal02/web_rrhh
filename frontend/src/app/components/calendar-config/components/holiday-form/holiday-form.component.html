<div class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">

        <div class="fixed inset-0 bg-black bg-opacity-30 transition-opacity" aria-hidden="true" (click)="cancel.emit()">
        </div>

        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <div
            class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">
                    {{ holiday() ? 'Editar Festivo' : 'Nuevo Festivo' }}
                </h3>

                <div class="space-y-4">
                    <!-- Date -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 flex items-center justify-between">
                            <span>Fecha</span>
                            <div class="group relative flex items-center">
                                <ng-icon name="lucideHelpCircle"
                                    class="text-indigo-400 hover:text-indigo-600 transition-colors cursor-help"></ng-icon>
                                <div
                                    class="absolute right-0 bottom-full mb-2 w-48 p-2 bg-gray-900 text-white text-[10px] rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 font-medium normal-case tracking-normal">
                                    Día en el que se aplicará el festivo o evento corporativo.
                                </div>
                            </div>
                        </label>
                        <input type="date" [ngModel]="formDate()" (ngModelChange)="formDate.set($event)"
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                        <input type="text" [ngModel]="formName()" (ngModelChange)="formName.set($event)"
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <!-- Type -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 flex items-center justify-between">
                            <span>Tipo</span>
                            <div class="group relative flex items-center">
                                <ng-icon name="lucideHelpCircle"
                                    class="text-indigo-400 hover:text-indigo-600 transition-colors cursor-help"></ng-icon>
                                <div
                                    class="absolute right-0 bottom-full mb-2 w-48 p-2 bg-gray-900 text-white text-[10px] rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 font-medium normal-case tracking-normal">
                                    Nivel de aplicación del festivo (ej: nacional afecta a todos, local solo a una
                                    sede).
                                </div>
                            </div>
                        </label>
                        <select [ngModel]="formType()" (ngModelChange)="formType.set($event)"
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                            <option [value]="HolidayType.NATIONAL">Nacional</option>
                            <option [value]="HolidayType.REGIONAL">Autonómico</option>
                            <option [value]="HolidayType.LOCAL">Local</option>
                            <option [value]="HolidayType.OTHER">Otro</option>
                        </select>
                    </div>

                    <!-- Description -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
                        <textarea [ngModel]="formDescription()" (ngModelChange)="formDescription.set($event)" rows="2"
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button (click)="onSubmit()" type="button" [disabled]="!formDate() || !formName()"
                    class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                    Guardar
                </button>
                <button (click)="cancel.emit()" type="button"
                    class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                    Cancelar
                </button>
            </div>
        </div>
    </div>
</div>
