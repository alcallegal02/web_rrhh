<div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
    <div class="flex items-center gap-3 mb-6 pb-3 border-b border-gray-50">
        <ng-icon name="lucideCamera" class="text-xl"></ng-icon>
        <h3 class="font-bold text-gray-800 tracking-tight">Datos Personales</h3>
    </div>

    <div class="flex flex-col items-center gap-4 mb-6">
        <div class="relative group">
            <div
                class="w-32 h-32 rounded-3xl bg-gray-50 overflow-hidden border-4 border-white shadow-xl group-hover:border-blue-100 transition-all">
                @if (previewProfilePicUrl() || form().photo_url) {
                <img [src]="previewProfilePicUrl() ? previewProfilePicUrl() : getFileUrl(form().photo_url)"
                    class="w-full h-full object-cover">
                } @else {
                <div class="flex items-center justify-center w-full h-full bg-blue-50 text-blue-300">
                    <ng-icon name="lucideUser" class="text-6xl flex items-center justify-center"></ng-icon>
                </div>
                }
            </div>
            <label
                class="absolute -bottom-2 -right-2 bg-blue-600 text-white p-2 rounded-xl shadow-lg cursor-pointer hover:bg-blue-700 transition-all flex items-center justify-center">
                <ng-icon name="lucideImagePlus"></ng-icon>
                <input type="file" (change)="onPhotoUpload($event)" accept="image/*" class="hidden">
            </label>
        </div>
        @if (uploadingPhoto()) {
        <span class="text-xs text-blue-500 font-bold animate-pulse">Subiendo imagen...</span>
        }
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Email
                Corporativo</label>
            <input class="input-field-new" [ngModel]="form().email" (ngModelChange)="updateField('email', $event)"
                name="email" required type="email" placeholder="email@inespasa.com" />
        </div>
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Nombre de
                Usuario</label>
            <input class="input-field-new" [ngModel]="form().username" (ngModelChange)="updateField('username', $event)"
                name="username" required placeholder="p.ej. juan.perez" />
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label
                    class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Nombre</label>
                <input class="input-field-new" [ngModel]="form().first_name"
                    (ngModelChange)="updateField('first_name', $event)" name="first_name" required />
            </div>
            <div>
                <label
                    class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Apellidos</label>
                <input class="input-field-new" [ngModel]="form().last_name"
                    (ngModelChange)="updateField('last_name', $event)" name="last_name" required />
            </div>
        </div>
        <div>
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Acceso
                (Contraseña)</label>
            <input class="input-field-new" [ngModel]="form().password" (ngModelChange)="updateField('password', $event)"
                name="password" [required]="!form().id" type="password"
                [placeholder]="form().id ? '••••••••' : 'Indique contraseña...'" />
            @if (form().id) {
            <p class="text-[10px] text-gray-400 mt-1 italic">Solo rellene para cambiar la actual.</p>
            }
        </div>
    </div>
</div>
