@if (userId() && role() !== 'superadmin') {
<div class="bg-red-50 p-6 rounded-2xl border border-red-100 space-y-3">
    <h4 class="text-sm font-bold text-red-800 flex items-center gap-2">⚠️ Zona de Gestión Crítica</h4>
    <div class="flex gap-2">
        @if (isActive()) {
        <button type="button"
            class="flex-1 bg-white text-orange-600 border border-orange-200 hover:bg-orange-50 px-4 py-2 rounded-lg text-xs font-bold transition-all"
            (click)="deactivate.emit()">🚫 Baja Temporal</button>
        } @else {
        <button type="button"
            class="flex-1 bg-green-600 text-white hover:bg-green-700 px-4 py-2 rounded-lg text-xs font-bold transition-all"
            (click)="activate.emit()">✅ Reactivar Alta</button>
        }
        <button type="button"
            class="bg-red-600 text-white hover:bg-red-700 px-4 py-2 rounded-lg text-xs font-bold transition-all"
            (click)="delete.emit()">🗑️ Eliminar Definitivo</button>
    </div>
</div>
}
