services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-18.1-alpine3.23}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_postgres_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres_prod}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    # Security Hardening
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES:-5}
    networks:
      - data_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: postgres -c 'shared_buffers=16MB' -c 'max_connections=60' -c 'shared_preload_libraries=pg_stat_statements'


  redis:
    image: redis:${REDIS_VERSION:-8.4.0-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_redis_prod
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 100mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - data_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: always
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3


  media:
    build:
      context: ./media_service
      dockerfile: Dockerfile.prod
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_media_prod
    volumes:
      - ./media_data:/media_data
    networks:
      - data_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL


  backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.prod}
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13-slim}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_backend_prod
    user: appuser
    volumes: 
      - ./media_data:/media_data
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}${POSTGRES_SSL_PARAMS:-}
      MEDIA_SERVICE_URL: http://media:8000
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-10}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME}
      ADMIN_ROLE: ${ADMIN_ROLE}
      MAX_DOCUMENT_SIZE_MB: ${MAX_DOCUMENT_SIZE_MB}
      MAX_COMPLAINT_PAYLOAD_MB: ${MAX_COMPLAINT_PAYLOAD_MB}
      MAX_NEWS_PAYLOAD_MB: ${MAX_NEWS_PAYLOAD_MB}
      DAILY_UPLOAD_QUOTA_MB: ${DAILY_UPLOAD_QUOTA_MB}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_TLS: ${SMTP_TLS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      BRUTE_FORCE_MAX_ATTEMPTS: ${BRUTE_FORCE_MAX_ATTEMPTS:-5}
      BRUTE_FORCE_BLOCK_MINUTES: ${BRUTE_FORCE_BLOCK_MINUTES:-30}
      BRUTE_FORCE_REDIRECT_URL: ${BRUTE_FORCE_REDIRECT_URL:-/complaint}
      DB_AUTO_MIGRATE: "true"
      # Network / Security
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
      media:
        condition: service_healthy
    networks:
      - backend_net
      - data_net
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: ${BACKEND_COMMAND:-uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${BACKEND_WORKERS:-4} --proxy-headers}

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile.prod}
      args:
        NODE_VERSION: ${NODE_VERSION:-24-alpine3.22}
        NGINX_VERSION: alpine
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_frontend_prod
    user: nginx
    depends_on:
      - backend
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  nginx:
    image: nginx:${NGINX_VERSION:-1.29.4-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_nginx_prod
    user: "101:101"
    volumes:
      - ./nginx/nginx.conf.prod.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/error_pages:/usr/share/nginx/error_pages:ro
      - ./media_data:/media:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      MAX_BODY_SIZE: ${MAX_IMAGE_SIZE_MB:-10}M
    command: >
      /bin/sh -c "
      ln -sf /dev/stdout /tmp/access.log &&
      ln -sf /dev/stderr /tmp/error.log &&
      envsubst '$$MAX_BODY_SIZE' < /etc/nginx/nginx.conf.template > /tmp/nginx.conf &&
      nginx -c /tmp/nginx.conf -e /tmp/error.log -g 'daemon off;'
      "
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      - frontend
      - backend
    networks:
      - frontend_net
      - backend_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backups:
    image: postgres:${POSTGRES_VERSION:-18.1-alpine3.23}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_backups_prod
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_KEEP_DAYS: 5
    volumes:
      - ./backups:/backups
      - ./media_data:/media:ro
      - ./scripts/backup.sh:/usr/local/bin/backup.sh
    networks:
      - data_net
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh"]
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    restart: always
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  data_net:
    driver: bridge
    internal: true

volumes:
  redis_data:
