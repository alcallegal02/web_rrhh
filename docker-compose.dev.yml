services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-18-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL:-10s}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES:-5}
      start_period: 30s
    command: postgres -c 'shared_preload_libraries=pg_stat_statements'
    # Security Hardening
    read_only: true
    tmpfs:
      - /var/run/postgresql
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    networks:
      - data_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:${REDIS_VERSION:-8.4-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_redis_dev
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 100mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - data_net
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  media:
    build:
      context: ./media_service
      dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_media_dev
    volumes:
      - ./media_service:/app
      - ./media_data:/media_data
    networks:
      - data_net
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile.dev}
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13-slim}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_backend_dev
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MEDIA_SERVICE_URL: http://media:8000
      PYTHONDONTWRITEBYTECODE: 1
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-10}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Admin RRHH}
      ADMIN_ROLE: ${ADMIN_ROLE:-superadmin}
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-10}
      MAX_DOCUMENT_SIZE_MB: ${MAX_DOCUMENT_SIZE_MB:-10}
      MAX_COMPLAINT_PAYLOAD_MB: ${MAX_COMPLAINT_PAYLOAD_MB:-20}
      MAX_NEWS_PAYLOAD_MB: ${MAX_NEWS_PAYLOAD_MB:-30}
      DAILY_UPLOAD_QUOTA_MB: ${DAILY_UPLOAD_QUOTA_MB:-50}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_TLS: ${SMTP_TLS:-True}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-RRHH}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@example.com}
      BRUTE_FORCE_REDIRECT_URL: ${BRUTE_FORCE_REDIRECT_URL:-/complaint}
      DB_AUTO_MIGRATE: "true"
      # Network / Security
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      UPLOAD_DIR: /media_data
    volumes:
      - ./backend:/app
      - ./media_data:/media_data
      - ${BACKEND_VOLUME_EXCLUDE:-/app/__pycache__}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      media:
        condition: service_started
    networks:
      - backend_net
      - data_net
    command: ${BACKEND_COMMAND:-uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers}
    # Security Hardening
    user: appuser
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile.dev}
      args:
        NODE_VERSION: ${NODE_VERSION:-24-alpine3.22}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_frontend_dev
    environment:
      API_URL: ${API_URL}
      WS_URL: ${WS_URL}
      NG_SERVE_HOST: ${NG_SERVE_HOST:-0.0.0.0}
      NG_SERVE_PORT: ${NG_SERVE_PORT:-4200}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      - backend
    networks:
      - frontend_net
    command: ${FRONTEND_COMMAND:-npm start}
    # Security Hardening
    user: node
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:${NGINX_VERSION:-1.29.4-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-web_rrhh}_nginx_dev
    volumes:
      - ./nginx/nginx.conf.dev:/etc/nginx/nginx.conf:ro
      - ./nginx/error_pages:/usr/share/nginx/error_pages:ro
      - ./media_data:/media:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - frontend
      - backend
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/log/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - frontend_net
      - backend_net
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  data_net:
    driver: bridge

volumes:
  redis_data_dev:


