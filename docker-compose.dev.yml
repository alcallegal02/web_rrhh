services:
  postgres:
    image: postgres:18-alpine
    container_name: web_rrhh_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_INTERNAL_PORT}"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: postgres -c 'shared_preload_libraries=pg_stat_statements'
    networks:
      - data_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8.4-alpine
    container_name: web_rrhh_redis_dev
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 100mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    ports:
      - "${REDIS_EXTERNAL_PORT}:${REDIS_INTERNAL_PORT}"
    volumes:
      - redis_data_dev:/data
    networks:
      - data_net
    # Security Hardening (Reduced for Dev)
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  media:
    build:
      context: ./media_service
      dockerfile: Dockerfile.dev
    container_name: web_rrhh_media_dev
    volumes:
      - ./media_service:/app
      - ./media_data:/media_data
    networks:
      - data_net
    # Security Hardening (Reduced for Dev)
    tmpfs:
      - /tmp
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        PYTHON_VERSION: 3.14-alpine
    container_name: web_rrhh_backend_dev
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_INTERNAL_PORT}/${POSTGRES_DB}
      MEDIA_SERVICE_URL: http://${MEDIA_HOST}:${MEDIA_INTERNAL_PORT}
      PYTHONDONTWRITEBYTECODE: 1
      ENVIRONMENT: development
      DB_AUTO_MIGRATE: "true"
      UPLOAD_DIR: /media_data
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_INTERNAL_PORT}
    volumes:
      - ./backend:/app
      - ./media_data:/media_data
      - /app/__pycache__
    ports:
      - "${BACKEND_EXTERNAL_PORT}:${BACKEND_INTERNAL_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      media:
        condition: service_started
    networks:
      - backend_net
      - data_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers
    # Security Hardening (Reduced for Dev)
    user: appuser
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NODE_VERSION: 24-alpine
    container_name: web_rrhh_frontend_dev
    environment:
      API_URL: ${API_URL}
      WS_URL: ${WS_URL}
      NG_SERVE_HOST: ${NG_SERVE_HOST}
      NG_SERVE_PORT: ${NG_SERVE_PORT}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_EXTERNAL_PORT}:${FRONTEND_INTERNAL_PORT}"
    depends_on:
      - backend
    networks:
      - frontend_net
    command: npm start
    # Security Hardening (Reduced for Dev)
    user: node
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.29.4-alpine
    container_name: web_rrhh_nginx_dev
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/error_pages:/usr/share/nginx/error_pages:ro
      - ./media_data:/media:ro
    environment:
      - NGINX_INTERNAL_PORT=${NGINX_INTERNAL_PORT}
      - FRONTEND_HOST=${FRONTEND_HOST}
      - FRONTEND_PORT=${FRONTEND_INTERNAL_PORT}
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=${BACKEND_INTERNAL_PORT}
      - CSP_FRAME_SOURCES=${CSP_FRAME_SOURCES}
    ports:
      - "${NGINX_EXTERNAL_PORT}:${NGINX_INTERNAL_PORT}"
    depends_on:
      - frontend
      - backend
    # Security Hardening (Reduced for Dev)
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/log/nginx
      - /var/run
      - /etc/nginx/conf.d
    networks:
      - frontend_net
      - backend_net
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  data_net:
    driver: bridge

volumes:
  redis_data_dev:

