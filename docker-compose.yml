services:
  postgres:
    image: postgres:16-alpine
    container_name: web_rrhh_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web_rrhh_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web_rrhh_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB}
      MAX_DOCUMENT_SIZE_MB: ${MAX_DOCUMENT_SIZE_MB}
      MAX_COMPLAINT_PAYLOAD_MB: ${MAX_COMPLAINT_PAYLOAD_MB}
      MAX_NEWS_PAYLOAD_MB: ${MAX_NEWS_PAYLOAD_MB}
      DAILY_UPLOAD_QUOTA_MB: ${DAILY_UPLOAD_QUOTA_MB}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_TLS: ${SMTP_TLS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web_rrhh_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web_rrhh_frontend
    environment:
      API_URL: ${API_URL:-http://localhost/api}
      WS_URL: ${WS_URL:-ws://localhost/ws}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    depends_on:
      - backend
    networks:
      - web_rrhh_network
    command: npm start

  nginx:
    image: nginx:alpine
    container_name: web_rrhh_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/error_pages:/usr/share/nginx/error_pages:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - frontend
      - backend
    networks:
      - web_rrhh_network

volumes:
  postgres_data:

networks:
  web_rrhh_network:
    driver: bridge

