services:
  postgres:
    image: postgres:18-alpine
    container_name: web_rrhh_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - web_rrhh_network

  redis:
    image: redis:8.4.0-alpine
    container_name: web_rrhh_redis
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 100mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - web_rrhh_network
    restart: always

  media:
    build:
      context: ./media_service
      dockerfile: Dockerfile
    container_name: web_rrhh_media
    volumes:
      - ./media_data:/media_data
    # Security Hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    networks:
      - web_rrhh_network
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: web_rrhh_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_INTERNAL_PORT}/${POSTGRES_DB}
      MEDIA_SERVICE_URL: http://${MEDIA_HOST}:${MEDIA_INTERNAL_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_INTERNAL_PORT}
      ENVIRONMENT: production
    volumes:
      - ./media_data:/media_data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web_rrhh_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: web_rrhh_frontend
    environment:
      API_URL: ${API_URL:-/api}
      WS_URL: ${WS_URL:-/ws}
    depends_on:
      - backend
    networks:
      - web_rrhh_network

  nginx:
    image: nginx:alpine
    container_name: web_rrhh_nginx
    volumes:
      - ./nginx/nginx.prod.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/error_pages:/usr/share/nginx/error_pages:ro
      - ./media_data:/media:ro
    environment:
      - NGINX_INTERNAL_PORT=${NGINX_INTERNAL_PORT}
      - FRONTEND_HOST=${FRONTEND_HOST}
      - FRONTEND_PROD_PORT=${FRONTEND_PROD_PORT}
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=${BACKEND_INTERNAL_PORT}
      - CSP_FRAME_SOURCES=${CSP_FRAME_SOURCES}
    ports:
      - "${NGINX_EXTERNAL_PORT}:${NGINX_INTERNAL_PORT}"
    depends_on:
      - frontend
      - backend
    networks:
      - web_rrhh_network
    # Security Hardening (Added tmpfs for templates)
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/log/nginx
      - /var/run
      - /etc/nginx/conf.d



volumes:
  redis_data:

networks:
  web_rrhh_network:
    driver: bridge
